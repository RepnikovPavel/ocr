# Server deployment: vLLM plus the demo/agent API, as two services.
#
#   scripts/deploy_server.sh            # prepares and brings both up
#
# Two containers rather than one because they have different lifetimes: vLLM owns
# the GPU and takes ~40 s to become ready, while the demo restarts in a second and
# is the part that changes when code changes. Keeping them apart means deploying
# new code does not reload 6 GB of weights.
#
# Everything is parameterised through .env / the environment so one file serves
# a laptop and a server; scripts/deploy_server.sh writes the values it needs.

services:
  vllm:
    image: ${VLLM_IMAGE:-dots-mocr:vllm}
    container_name: ${VLLM_CONTAINER:-dots_vllm}
    restart: unless-stopped
    ipc: host
    # The checkpoint is served from a symlink shadow with auto_map restored:
    # scripts/prepare_checkpoint.py strips it for this repo's own loader, but
    # vLLM resolves the architecture through transformers and needs it.
    command:
      - /ckpt
      - --served-model-name=${VLLM_MODEL_NAME:-rednote-hilab/dots.mocr}
      - --gpu-memory-utilization=${VLLM_GPU_UTIL:-0.85}
      - --max-model-len=${VLLM_MAX_MODEL_LEN:-16384}
      - --chat-template-content-format=string
      - --trust-remote-code
      # sleep mode is what makes the demo's idle auto-unload actually return the
      # card; without it "unload" would free nothing (see demo/worker.py)
      - --enable-sleep-mode
      - --host=0.0.0.0
      - --port=8000
    environment:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HOME: /tmp/hf
      VLLM_SERVER_DEV_MODE: "1"        # registers /sleep and /wake_up
    # Published explicitly: the demo runs on host networking, so without this it
    # cannot reach the container at all — and on a busy host 127.0.0.1:8000 may
    # already answer for something else, which reads as a confusing 404 rather
    # than a connection refused.
    ports:
      - "127.0.0.1:${VLLM_PORT:-8000}:8000"
    volumes:
      - ${VLLM_CKPT_SHADOW:?set by deploy_server.sh}:/ckpt:ro
      - /mnt:/mnt:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_GPU:-0}"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  demo:
    image: ${DOTS_MOCR_IMAGE:-dots-mocr:trtllm-1.3.0rc20}
    container_name: ${DEMO_CONTAINER:-dots_mocr_demo}
    restart: unless-stopped
    init: true
    # The demo holds no weights under this engine, so it needs no GPU at all —
    # only a route to vLLM. That is also why it restarts instantly.
    network_mode: host
    command: ["python3", "-m", "demo.server"]
    working_dir: /opt/dots-mocr
    environment:
      CKPTDIR: /models
      DEMO_STATE_DIR: /state
      DEMO_ENGINE: vllm
      DEMO_VLLM_URL: http://127.0.0.1:${VLLM_PORT:-8000}/v1
      DEMO_VLLM_MODEL: ${VLLM_MODEL_NAME:-rednote-hilab/dots.mocr}
      DEMO_IDLE_UNLOAD_S: ${DEMO_IDLE_UNLOAD_S:-180}
      PORT: ${DEMO_PORT:-8601}
      DEMO_HOST: ${DEMO_HOST:-127.0.0.1}
      DOTS_MOCR_WEB_PORT: ${DEMO_PORT:-8601}
      PYTHONPATH: /opt/dots-mocr:/opt/dots-mocr/src
      HOME: /tmp
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      # the checkout, so deploying new code does not mean rebuilding a 60 GB image
      - ${REPO_ROOT:?set by deploy_server.sh}:/opt/dots-mocr:ro
      - ${CKPT_DIR:?set by deploy_server.sh}:/models:ro
      - ${STATE_DIR:?set by deploy_server.sh}:/state
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:${DEMO_PORT:-8601}/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
